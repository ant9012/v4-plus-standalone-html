<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSDKv4</title>
  <script src="coi-serviceworker.js"></script>
  <!-- favicon managed dynamically by FaviconLoader below -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #0a0800;
      --panel-bg:    #110f00;
      --panel-border:#221e00;
      --text:        #f0ecd8;
      --text-muted:  #706840;
      --accent:      #f5c400;
      --accent-dark: #b88c00;
      --blue:        #2255cc;
      --blue-light:  #4488ff;
      --red:         #e63a30;
      --hover-bg:    #1a1600;
      --active-bg:   #222000;
      --selected-bg: #1e1a00;
      --sidebar-w:   280px;
      --radius:      6px;
      --transition:  0.15s ease;
    }
    html, body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px; user-select: none;
    }
    #app { display: flex; width: 100vw; height: 100vh; position: relative; }

    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100%;
      background: var(--panel-bg); border-right: 1px solid var(--panel-border);
      display: flex; flex-direction: column; z-index: 20;
      transition: width var(--transition), min-width var(--transition);
    }
    #sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; }

    .sidebar-header {
      padding: 12px 14px 8px; border-bottom: 1px solid var(--panel-border);
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; }
    .sidebar-logo-favicon {
      width: 36px; height: 36px; image-rendering: pixelated;
      filter: drop-shadow(0 0 6px #f5c40055);
      flex-shrink: 0;
    }
    .sidebar-logo-favicon-placeholder {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--panel-border); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .sidebar-logo-title { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
    .sidebar-logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

    .launch-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #1a0e00; border: none; border-radius: var(--radius);
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; width: 100%; letter-spacing: .5px;
      transition: opacity var(--transition), transform var(--transition);
    }
    .launch-btn:hover { opacity: .9; transform: translateY(-1px); }
    .launch-btn:active { transform: translateY(0); }
    .launch-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .file-toolbar {
      display: flex; flex-wrap: wrap; gap: 3px;
      padding: 6px 8px; border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
    }
    .tb-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; background: transparent;
      border: 1px solid transparent; border-radius: var(--radius);
      color: var(--text-muted); cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .tb-btn:hover { background: var(--hover-bg); color: var(--text); border-color: var(--panel-border); }
    .tb-btn:active { background: var(--active-bg); }
    .tb-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .tb-btn:disabled { opacity: .35; pointer-events: none; }
    .tb-divider { width: 1px; height: 20px; background: var(--panel-border); margin: 4px 2px; }
    .tb-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .breadcrumb {
      display: flex; align-items: center; gap: 2px;
      padding: 4px 8px; border-bottom: 1px solid var(--panel-border);
      overflow-x: auto; flex-shrink: 0; min-height: 28px;
    }
    .breadcrumb::-webkit-scrollbar { display: none; }
    .bc-item {
      color: var(--blue-light); cursor: pointer; font-size: 11px;
      white-space: nowrap; padding: 2px 4px; border-radius: 3px;
      transition: background var(--transition);
    }
    .bc-item:hover { background: var(--hover-bg); }
    .bc-sep { color: var(--text-muted); font-size: 11px; }

    #file-list-wrap {
      flex: 1; overflow-y: auto; padding: 4px; position: relative;
    }
    #file-list-wrap.drag-over::after {
      content: 'Drop files here'; position: absolute; inset: 0;
      background: rgba(245,196,0,.1); border: 2px dashed var(--accent);
      border-radius: var(--radius); display: flex; align-items: center;
      justify-content: center; font-size: 14px; color: var(--accent);
      pointer-events: none; z-index: 10;
    }
    #fm-loading {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; height: 80px;
    }
    .fm-spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--panel-border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .9s linear infinite;
    }
    .fm-loading-text { font-size: 11px; color: var(--text-muted); }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px; border-radius: var(--radius); cursor: pointer;
      border: 1px solid transparent; transition: background var(--transition);
      white-space: nowrap; overflow: hidden;
    }
    .file-item:hover { background: var(--hover-bg); }
    .file-item.selected { background: var(--selected-bg); border-color: var(--blue); }
    .file-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .file-item .file-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .file-item.dir svg { color: var(--accent); stroke: var(--accent); fill: none; }
    .file-item.file svg { color: var(--text-muted); stroke: var(--text-muted); fill: none; }
    #file-list-empty { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px 8px; display: none; }

    .settings-panel {
      border-top: 1px solid var(--panel-border); padding: 8px 12px; flex-shrink: 0;
    }

    #sidebar-toggle {
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      z-index: 30; width: 20px; height: 56px;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-left: none; border-radius: 0 var(--radius) var(--radius) 0;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: color var(--transition), background var(--transition);
    }
    #sidebar-toggle:hover { background: var(--hover-bg); color: var(--text); }
    #sidebar-toggle svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    #canvas-area { flex: 1; position: relative; background: #000; overflow: hidden; }
    #canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; image-rendering: pixelated; display: block;
    }

    #splash {
      position: absolute; inset: 0; z-index: 100; background: #050400;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    }
    #splash-icon {
      width: 96px; height: 96px; image-rendering: pixelated;
      filter: drop-shadow(0 0 20px #f5c40055);
      animation: splash-pulse 2s ease-in-out infinite;
      display: none;
    }
    #splash-placeholder {
      font-size: 64px; line-height: 1;
      filter: drop-shadow(0 0 20px #f5c40055);
      animation: splash-pulse 2s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%,100% { filter: drop-shadow(0 0 12px #f5c40033); }
      50%       { filter: drop-shadow(0 0 28px #f5c40088); }
    }
    .splash-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--panel-border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #splash-status { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

    #console-panel {
      position: absolute; bottom: 0; left: 0; right: 0; height: 220px;
      background: rgba(5,4,0,.95); border-top: 1px solid var(--panel-border);
      display: none; flex-direction: column; z-index: 50; backdrop-filter: blur(8px);
    }
    #console-panel.visible { display: flex; }
    .console-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 10px; border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
    }
    .console-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    .console-btns { display: flex; gap: 6px; }
    .console-btn {
      font-size: 11px; padding: 2px 8px; background: var(--hover-bg);
      border: 1px solid var(--panel-border); border-radius: 3px; color: var(--text-muted); cursor: pointer;
    }
    .console-btn:hover { color: var(--text); }
    #console-output {
      flex: 1; overflow-y: auto; padding: 4px 8px;
      font-family: 'Cascadia Code','Fira Code',monospace; font-size: 11px; line-height: 1.5;
    }
    #console-output::-webkit-scrollbar { width: 6px; }
    #console-output::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
    .cl { white-space: pre-wrap; word-break: break-all; }
    .cl-err  { color: #ff6b6b; }
    .cl-warn { color: #ffd93d; }
    .cl-info { color: #74c0fc; }
    .cl-ok   { color: #69db7c; }
    .cl-hi   { color: var(--accent); }

    #progress-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    #progress-overlay.visible { display: flex; }
    .progress-box {
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 10px; padding: 24px 32px; min-width: 320px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .progress-title { font-weight: 600; font-size: 14px; }
    .progress-status { font-size: 12px; color: var(--text-muted); }
    .progress-bar-wrap { width: 100%; height: 6px; background: var(--panel-border); border-radius: 3px; overflow: hidden; }
    #progress-bar { height: 100%; background: linear-gradient(90deg, var(--blue-light), var(--accent)); border-radius: 3px; transition: width .1s ease; width: 0%; }

    * { scrollbar-width: thin; scrollbar-color: var(--panel-border) transparent; }
  </style>
</head>
<body>

<div id="progress-overlay">

    <div class="progress-title">&#x1F4C1; Working...</div>
    <div class="progress-status" id="progress-status">Please wait</div>
    <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
  <img id="sidebar-favicon" class="sidebar-logo-favicon" src="https://cdn.jsdelivr.net/gh/ant9012/v4-plus-standalone-html@main/RSDKv4.png" />
  <div>
          <div class="sidebar-logo-title" id="sidebar-title">RSDKv4</div>

    <div class="file-toolbar">

       style="width: 96px; height: 96px; image-rendering: pixelated; filter: drop-shadow(0 0 20px #f5c40055); animation: splash-pulse 2s ease-in-out infinite;" />

<script>
/* ============================================================
   CDN BASE — ant9012/v4-plus-standalone-html via jsDelivr

   DEV_MODE: set true to load RSDKv4.js/.wasm from local files
   next to index.html. Expected: RSDKv4.js, RSDKv4.wasm, lib/RSDKv4.js
   ============================================================ */
const DEV_MODE = true;

const CDN_BASE     = 'https://cdn.jsdelivr.net/gh/ant9012/v4-plus-standalone-html@main/';
const CDN_FILES_JS = CDN_BASE + 'Files.js';
const CDN_LIB_RSDK = CDN_BASE + 'lib/RSDKv4.js';
const CDN_RSDK_JS  = CDN_BASE + 'RSDKv4.js';

const LIB_RSDK = DEV_MODE ? './lib/RSDKv4.js' : CDN_LIB_RSDK;
const RSDK_JS  = DEV_MODE ? './RSDKv4.js'      : CDN_RSDK_JS;

/* ============================================================
   Console buffer
   ============================================================ */
window.__engineConsoleBuffer = [];
window.__engineConsoleAppend = function(text) {
  window.__engineConsoleBuffer.push(text);
  if (window.__engineConsoleBuffer.length > 500)
    window.__engineConsoleBuffer.splice(0, 1);
  appendConsoleLine(text);
};

/* ============================================================
   FaviconLoader — ported from lib/FaviconLoader.ts
   Watches document.title and swaps the favicon to match the
   game that was loaded (Sonic 1, Sonic 2, Sonic CD, etc.)
   Icons are resolved relative to the HTML file's location.
   ============================================================ */
const FaviconLoader = (() => {
  const faviconMap = {
    'Sonic the Hedgehog 3': CDN_BASE + 's3k.ico',
    'Sonic 3 & Knuckles': CDN_BASE + 's3k.ico',
    'Sonic 3': CDN_BASE + 's3k.ico',
    'Sonic the Hedgehog 2': CDN_BASE + 's2.ico',
    'Sonic 2': CDN_BASE + 's2.ico',
    'Sonic the Hedgehog': CDN_BASE + 's1.ico',
    'Sonic 1': CDN_BASE + 's1.ico',
  };
  const defaultFavicon = CDN_BASE + 'RSDKv4.png';
  let currentFavicon = '';
  let updateTimeout  = null;

  function resolve(rel) {
    // For file:// just use relative paths — no base detection needed
    return rel.replace(/\/+/g, '/');
  }

  function setFavicon(path) {
    const cacheBusted = path + '?v=' + Date.now();
    // Remove existing favicon links
    document.querySelectorAll('link[rel*="icon"]').forEach(el => el.remove());
    ['icon', 'shortcut icon', 'apple-touch-icon'].forEach(rel => {
      const l = document.createElement('link');
      l.rel  = rel;
      if (rel === 'icon') l.type = 'image/x-icon';
      l.href = cacheBusted;
      document.head.appendChild(l);
    });
    // Force refresh in stubborn browsers
    setTimeout(() => {
      document.querySelectorAll('link[rel*="icon"]').forEach(l => {
        const h = l.href; l.href = ''; setTimeout(() => l.href = h, 10);
      });
    }, 100);
  }

  function updateFavicon() {
    const title = document.title;
    let path = defaultFavicon;
    // Match longest key first (most specific)
    const sorted = Object.keys(faviconMap).sort((a, b) => b.length - a.length);
    for (const key of sorted) {
      if (title.toLowerCase().includes(key.toLowerCase())) {
        path = faviconMap[key]; break;
      }
    }
    const resolved = resolve(path);
    setFavicon(resolved);
    currentFavicon = resolved;

    // Also update the sidebar logo favicon and splash icon
    updateSidebarFavicon(resolved, title);
  }

  function updateSidebarFavicon(iconPath, title) {
    // Sidebar favicon image
    const img = document.getElementById('sidebar-favicon');
    const ph  = document.getElementById('sidebar-favicon-placeholder');
    if (img && ph) {
      img.src = iconPath + '?v=' + Date.now();
      img.style.display = 'block';
      ph.style.display  = 'none';
      img.onerror = () => { img.style.display = 'none'; ph.style.display = 'block'; };
    }
    // Sidebar title
    const titleEl = document.getElementById('sidebar-title');
    if (titleEl && title && title !== 'RSDKv4') titleEl.textContent = title;
    // Splash icon
    const splashImg = document.getElementById('splash-favicon');
    const splashPh  = document.getElementById('splash-placeholder');
    if (splashImg && splashPh) {
      splashImg.src = iconPath + '?v=' + Date.now();
      splashImg.style.cssText = 'display:block;width:96px;height:96px;image-rendering:pixelated;animation:splash-pulse 2s ease-in-out infinite;';
      splashPh.style.display  = 'none';
      splashImg.onerror = () => { splashImg.style.display = 'none'; splashPh.style.display = 'block'; };
    }
  }

  function scheduleUpdate() {
    if (updateTimeout) clearTimeout(updateTimeout);
    updateTimeout = setTimeout(updateFavicon, 100);
  }

  function init() {
    updateFavicon();
    // MutationObserver on <title>
    const obs = new MutationObserver(scheduleUpdate);
    const titleEl = document.querySelector('title');
    if (titleEl) obs.observe(titleEl, { childList: true, characterData: true, subtree: true });
    obs.observe(document.head, { childList: true, subtree: true });
    // Polling fallback
    let lastTitle = document.title;
    setInterval(() => {
      if (document.title !== lastTitle) { lastTitle = document.title; scheduleUpdate(); }
    }, 500);
  }

  function addMapping(title, path) { faviconMap[title] = path; updateFavicon(); }

  return { init, updateFavicon, addMapping };
})();

/* ============================================================
   favicon.ts — load favicon from Emscripten FS after mount
   ============================================================ */
function loadFaviconFromFS(engineDir) {
  const candidates = ['favicon.png','favicon.ico','favicon.jpg','favicon.webp','icon.png','icon.ico'];
  const mimeTypes  = { '.png':'image/png', '.ico':'image/x-icon', '.jpg':'image/jpeg', '.webp':'image/webp' };
  try {
    if (!window.FS) return;
    for (const candidate of candidates) {
      const filePath = engineDir + '/' + candidate;
      try { FS.stat(filePath); } catch { continue; }
      const data = FS.readFile(filePath);
      const ext  = candidate.substring(candidate.lastIndexOf('.'));
      const mime = mimeTypes[ext] || 'image/png';
      const url  = URL.createObjectURL(new Blob([data], { type: mime }));
      // Update favicon link
      let link = document.querySelector("link[rel~='icon']");
      if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
      link.type = mime; link.href = url;
      // Update sidebar + splash
      const img  = document.getElementById('sidebar-favicon');
      const ph   = document.getElementById('sidebar-favicon-placeholder');
      if (img && ph) { img.src = url; img.style.display = 'block'; ph.style.display = 'none'; }
      const simg = document.getElementById('splash-favicon');
      const sph  = document.getElementById('splash-placeholder');
      if (simg && sph) {
        simg.src = url;
        simg.style.cssText = 'display:block;width:96px;height:96px;image-rendering:pixelated;animation:splash-pulse 2s ease-in-out infinite;';
        sph.style.display = 'none';
      }
      console.log('[Favicon] Loaded from FS:', filePath);
      return;
    }
  } catch(err) {
    console.warn('[Favicon] Error:', err);
  }
}

/* ============================================================
   Module pre-config for Files.js
   ============================================================ */
var Module = {
  locateFile: function(path) {
    if (path.endsWith('.wasm') || path.endsWith('.worker.js'))
      return CDN_BASE + path;
    return path;
  },
  onRuntimeInitialized: function() {
    console.log('[Files.js] Runtime initialized');
    window._FilesModule = Module;
    fsReady();
  },
  print: function(text) {
    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
    window.__engineConsoleAppend?.('[FS] ' + text);
    console.log('[Files.js]', text);
  },
  printErr: function(text) {
    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
    window.__engineConsoleAppend?.('[FS][ERR] ' + text);
    console.error('[Files.js]', text);
  },
  setStatus: function(text) { if (text) console.log('[Files.js status]', text); },
  totalDependencies: 0,
  monitorRunDependencies: function(left) {
    Module.totalDependencies = Math.max(Module.totalDependencies, left);
  }
};

<script>
/* ============================================================
   Sidebar toggle
   ============================================================ */
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('toggle-chevron').setAttribute('points',
    sidebarOpen ? '15 18 9 12 15 6' : '9 18 15 12 9 6');
}

/* ============================================================
   Console UI
   ============================================================ */
let consoleVisible = true;
function getLineClass(l) {
  if (/\[ERROR\]|ERROR|Exception|\[FATAL\]/.test(l)) return 'cl-err';
  if (/WARNING|WARN|\[WARNING\]/.test(l)) return 'cl-warn';
  if (/\[INFO\]/.test(l)) return 'cl-info';
  if (/->/.test(l)) return 'cl-ok';
  if (/TRANSITIONING|\[STATUS\]/.test(l)) return 'cl-hi';
  return '';
}
function appendConsoleLine(text) {
  const out = document.getElementById('console-output');
  if (!out) return;
  const div = document.createElement('div');
  div.className = 'cl ' + getLineClass(text);
  div.textContent = text;
  out.appendChild(div);
  if (out.children.length > 500) out.removeChild(out.firstChild);
  if (consoleVisible) out.scrollTop = out.scrollHeight;
}
function consoleClear() { document.getElementById('console-output').innerHTML = ''; }
function consoleHide() { consoleVisible = false; document.getElementById('console-panel').classList.remove('visible'); }
document.addEventListener('keydown', e => {
  if (e.key === '`' || e.key === '~') {
    e.preventDefault();
    consoleVisible = !consoleVisible;
    document.getElementById('console-panel').classList.toggle('visible', consoleVisible);
    if (consoleVisible) document.getElementById('console-output').scrollTop = 99999;
  }
});

/* ============================================================
   EngineFS
   ============================================================ */
const EngineFS = (() => {
  let fspath = '/RSDKv4';
  let activeMount = null;
  let clipboard = null;

  function jp(...parts) { return ('/' + parts.join('/')).replace(/\/+/g, '/'); }

  async function Init(id) {
    if (activeMount) { try { FS.unmount(activeMount); } catch(e) {} activeMount = null; }
    if (!FS.analyzePath('/' + id).exists) FS.mkdir(id);
    FS.mount(IDBFS, { root: '/' + id }, id);
    activeMount = id;
    await new Promise((res, rej) => FS.syncfs(true, e => e ? rej(e) : res()));
    fspath = '/' + id;
  }

  function Save() {
    return new Promise((res, rej) => FS.syncfs(e => e ? rej(e) : res()));
  }

  function isDirPath(path) {
    try { return FS.isDir(FS.lookupPath(path).node.mode); } catch { return false; }
  }

  function progressShow(msg) {
    document.getElementById('progress-overlay').classList.add('visible');
    document.getElementById('progress-status').textContent = msg;
    document.getElementById('progress-bar').style.width = '0%';
  }
  function progressUpdate(msg, pct) {
    document.getElementById('progress-status').textContent = msg;
    document.getElementById('progress-bar').style.width = pct + '%';
  }
  function progressHide() {
    document.getElementById('progress-overlay').classList.remove('visible');
  }

  async function FileUploadCommon(files, shouldSave, parent) {
    parent = parent || fspath;
    progressShow('Uploading...');
    try {
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const relPath = file.webkitRelativePath || file.name;
        const filePath = jp(parent, relPath);
        progressUpdate('Uploading ' + relPath + '...', (i / files.length) * 90);
        let cur = '';
        for (const part of PATH.dirname(filePath).split('/')) {
          cur = jp(cur, part);
          if (cur.length > 1 && !FS.analyzePath(cur).exists) { try { FS.mkdir(cur); } catch(e) {} }
        }
        if (file.name.toLowerCase().endsWith('.zip')) {
          await ZipExtract(file, fspath);
        } else {
          FS.writeFile(filePath, new Uint8Array(await file.arrayBuffer()), { encoding: 'binary' });
        }
      }
      if (shouldSave) await Save();
    } finally { progressHide(); }
  }

  async function FileUploadDlg(useDir) {
    return new Promise((res, rej) => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.multiple = true;
      if (useDir) inp.webkitdirectory = true;
      inp.onchange = async () => {
        if (!inp.files?.length) { rej(); return; }
        try { await FileUploadCommon(inp.files, true); res(); } catch(e) { rej(e); }
      };
      inp.click();
    });
  }

  async function FileDownload(paths) {
    const zip = new JSZip();
    async function addToZip(path, zipPath) {
      if (!FS.lookupPath(path).node) return;
      if (isDirPath(path)) {
        for (const e of FS.readdir(path)) {
          if (e === '.' || e === '..') continue;
          await addToZip(path + '/' + e, zipPath + '/' + e);
        }
      } else { zip.file(zipPath, FS.readFile(path)); }
    }
    for (const p of paths) await addToZip(p, p.split('/').pop());
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'export.zip';
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
  }

  async function ZipExtract(file, fsPath) {
    const zip = await JSZip.loadAsync(file);
    const dirs = [], files = [];
    zip.forEach((relPath, entry) => {
      const full = jp(fsPath, relPath);
      if (entry.dir) dirs.push(full); else files.push({ path: full, entry });
    });
    for (const d of dirs) {
      let cur = '';
      for (const part of d.split('/')) {
        cur = jp(cur, part);
        if (cur.length > 1 && !FS.analyzePath(cur).exists) { try { FS.mkdir(cur); } catch(e) {} }
      }
    }
    await Promise.all(files.map(async ({ path, entry }) => {
      const data = await entry.async('uint8array');
      const dir = path.substring(0, path.lastIndexOf('/'));
      if (dir.length > 1 && !FS.analyzePath(dir).exists) { try { FS.mkdir(dir); } catch(e) {} }
      FS.writeFile(path, data, { encoding: 'binary' });
    }));
    await Save();
  }

  async function DirectoryCreate(name) {
    const dst = jp(fspath, name);
    FS.mkdir(dst); await Save();
  }

  function Cut(items)  { clipboard = { items, isCut: true }; }
  function Copy(items) { clipboard = { items, isCut: false }; }

  async function Paste() {
    if (!clipboard) return;
    const { items, isCut } = clipboard;
    for (const item of items) {
      const dst = jp(fspath, item.name);
      if (isCut) { FS.rename(item.path, dst); }
      else if (item.isDirectory) { dirCopyRecursive(item.path, dst); }
      else { FS.writeFile(dst, FS.readFile(item.path)); }
    }
    await Save(); clipboard = null;
  }

  function dirCopyRecursive(src, dst) {
    try { FS.stat(dst); } catch { FS.mkdir(dst); }
    for (const f of FS.readdir(src)) {
      if (f === '.' || f === '..') continue;
      const sp = src + '/' + f, dp = dst + '/' + f;
      if (isDirPath(sp)) dirCopyRecursive(sp, dp); else FS.writeFile(dp, FS.readFile(sp));
    }
  }

  async function Rename(src, dst) {
    FS.rename(jp(fspath, src), jp(fspath, dst)); await Save();
  }

  async function Delete(names) {
    if (!confirm('Delete selected items? This is irreversible.')) return;
    for (const n of names) {
      const p = jp(fspath, n);
      if (!FS.lookupPath(p).node) continue;
      if (isDirPath(p)) dirDeleteRecursive(p); else FS.unlink(p);
    }
    await Save();
  }

  function dirDeleteRecursive(path) {
    for (const f of FS.readdir(path)) {
      if (f === '.' || f === '..') continue;
      const fp = path + '/' + f;
      if (isDirPath(fp)) dirDeleteRecursive(fp); else FS.unlink(fp);
    }
    FS.rmdir(path);
  }

  function GetPathItems() {
    const items = [];
    try {
      for (const name of FS.readdir(fspath)) {
        if (name === '.' || name === '..') continue;
        const path = jp(fspath, name);
        items.push({ name, path, isDirectory: isDirPath(path) });
      }
    } catch(e) {}
    return items;
  }

  return {
    get fspath() { return fspath; },
    set fspath(v) { fspath = v; },
    Init, Save, FileUploadDlg, FileUploadCommon, FileDownload,
    ZipExtract, DirectoryCreate, Cut, Copy, Paste, Rename, Delete, GetPathItems,
  };
})();

window.EngineFS = EngineFS;

window.TS_InitFS = async function(id, callback) {
  try {
    console.log('[TS_InitFS] re-mounting IDBFS for engine:', id);
    await window.EngineFS.Init(id);
    // Load favicon from user-uploaded files (e.g. favicon.ico in /RSDKv4/)
    loadFaviconFromFS('/' + id);
    console.log('[TS_InitFS] ready');
    callback();
  } catch(e) {
    console.error('[TS_InitFS] failed:', e);
    window.__engineConsoleAppend?.('[ERROR] TS_InitFS: ' + e.message);
  }
};

/* ============================================================
   File Manager UI
   ============================================================ */
let fm_selected = [];
let fm_lastIdx  = null;
const FM_TOOLBAR_IDS = [
  'tb-upload-file','tb-upload-dir','tb-new-folder','tb-download',
  'tb-cut','tb-copy','tb-paste','tb-rename','tb-delete'
];

function fm_setEnabled(enabled) {
  FM_TOOLBAR_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = !enabled;
  });
}

async function fm_refresh() {
  const list  = document.getElementById('file-list');
  const empty = document.getElementById('file-list-empty');
  const items = EngineFS.GetPathItems();
  list.innerHTML = '';
  empty.style.display = items.length ? 'none' : 'block';
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'file-item ' + (item.isDirectory ? 'dir' : 'file');
    div.dataset.name = item.name;
    if (fm_selected.includes(item.name)) div.classList.add('selected');
    const iconDir  = '<svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>';
    const iconFile = '<svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>';
    div.innerHTML = (item.isDirectory ? iconDir : iconFile) +
                    '<span class="file-name">' + escHtml(item.name) + '</span>';
    div.addEventListener('click',    e  => fm_itemClick(item, idx, e));
    div.addEventListener('dblclick', () => fm_itemDblClick(item));
    list.appendChild(div);
  });
  fm_updateBreadcrumb(EngineFS.fspath);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fm_itemClick(item, idx, e) {
  e.stopPropagation();
  const all = EngineFS.GetPathItems();
  if (e.ctrlKey || e.metaKey) {
    fm_selected = fm_selected.includes(item.name)
      ? fm_selected.filter(x => x !== item.name) : [...fm_selected, item.name];
  } else if (e.shiftKey && fm_lastIdx !== null) {
    const lo = Math.min(fm_lastIdx, idx), hi = Math.max(fm_lastIdx, idx);
    fm_selected = [...new Set([...fm_selected, ...all.slice(lo, hi+1).map(x => x.name)])];
  } else {
    fm_lastIdx = idx;
    fm_selected = [item.name];
  }
  fm_renderSel();
}

async function fm_itemDblClick(item) {
  if (item.isDirectory) await fm_cd(EngineFS.fspath + '/' + item.name);
}

function fm_renderSel() {
  document.querySelectorAll('.file-item').forEach(el =>
    el.classList.toggle('selected', fm_selected.includes(el.dataset.name)));
}

function fm_clearSelection(e) {
  const wrap = document.getElementById('file-list-wrap');
  const list = document.getElementById('file-list');
  if (e.target === wrap || e.target === list) { fm_selected = []; fm_renderSel(); }
}

async function fm_cd(path) {
  EngineFS.fspath = path.replace(/\/+/g, '/');
  fm_selected = [];
  await fm_refresh();
}

function fm_updateBreadcrumb(path) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  const root = document.createElement('span');
  root.className = 'bc-item'; root.textContent = '/';
  root.onclick = () => fm_cd('/RSDKv4');
  bc.appendChild(root);
  const parts = path.split('/').filter(Boolean);
  parts.forEach((part, i) => {
    const sep = document.createElement('span'); sep.className = 'bc-sep'; sep.textContent = '›'; bc.appendChild(sep);
    const node = document.createElement('span'); node.className = 'bc-item'; node.textContent = part;
    const cp = '/' + parts.slice(0, i+1).join('/');
    node.onclick = () => fm_cd(cp);
    bc.appendChild(node);
  });
}

async function fm_uploadFile()   { await EngineFS.FileUploadDlg(false); await fm_refresh(); }
async function fm_uploadFolder() { await EngineFS.FileUploadDlg(true);  await fm_refresh(); }
async function fm_newFolder()    { const n = prompt('Folder name:'); if (n) { await EngineFS.DirectoryCreate(n); await fm_refresh(); } }
async function fm_download()     { if (fm_selected.length) await EngineFS.FileDownload(fm_selected.map(n => EngineFS.fspath + '/' + n)); }
async function fm_cut()   { EngineFS.Cut(EngineFS.GetPathItems().filter(x => fm_selected.includes(x.name))); }
async function fm_copy()  { EngineFS.Copy(EngineFS.GetPathItems().filter(x => fm_selected.includes(x.name))); }
async function fm_paste() { await EngineFS.Paste(); await fm_refresh(); }
async function fm_rename() {
  if (fm_selected.length !== 1) { alert('Select exactly one item.'); return; }
  const n = fm_selected[0], nn = prompt('New name:', n);
  if (nn && nn !== n) { await EngineFS.Rename(n, nn); await fm_refresh(); }
}
async function fm_delete() {
  if (!fm_selected.length) return;
  await EngineFS.Delete(fm_selected); fm_selected = []; await fm_refresh();
}

function fm_onDragOver(e)  { e.preventDefault(); e.stopPropagation(); document.getElementById('file-list-wrap').classList.add('drag-over'); }
function fm_onDragEnter(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('file-list-wrap').classList.add('drag-over'); }
function fm_onDragLeave(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('file-list-wrap').classList.remove('drag-over'); }
async function fm_onDrop(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('file-list-wrap').classList.remove('drag-over');
  let doSave = false;
  for (const item of Array.from(e.dataTransfer.items)) {
    if (item.kind !== 'file') continue;
    const entry = item.webkitGetAsEntry?.();
    if (!entry) continue;
    if (entry.isFile) {
      const file = item.getAsFile();
      if (file) { await EngineFS.FileUploadCommon([file], false, EngineFS.fspath); doSave = true; }
    } else if (entry.isDirectory) {
      const newDir = EngineFS.fspath + '/' + entry.name;
      try { FS.mkdir(newDir); } catch(ex) {}
      await fm_dropDir(entry, newDir); doSave = true;
    }
  }
  if (doSave) await EngineFS.Save();
  await fm_refresh();
}
async function fm_dropDir(dirEntry, parentDir) {
  const reader = dirEntry.createReader();
  const entries = await new Promise(res => {
    const all = [];
    function read() { reader.readEntries(r => { if (r.length) { all.push(...r); read(); } else res(all); }); }
    read();
  });
  for (const e of entries) {
    if (e.isFile) {
      const file = await new Promise((res, rej) => e.file(res, rej));
      await EngineFS.FileUploadCommon([file], false, parentDir);
    } else if (e.isDirectory) {
      const sub = parentDir + '/' + e.name;
      try { FS.mkdir(sub); } catch(ex) {}
      await fm_dropDir(e, sub);
    }
  }
}

/* ============================================================
   Files.js ready callback
   ============================================================ */
async function fsReady() {
  try {
    document.getElementById('fm-loading').style.display = 'none';
    await EngineFS.Init('RSDKv4');
    // Try to load a user-supplied favicon from their uploaded game files
    loadFaviconFromFS('/RSDKv4');
    fm_setEnabled(true);
    await fm_refresh();
    setSplashStatus('Ready — press Launch Game to start');
    document.getElementById('launch-btn').disabled = false;
  } catch(e) {
    console.error('[Launcher] EngineFS.Init failed:', e);
    document.getElementById('fm-loading').innerHTML =
      '<div style="color:var(--red);font-size:11px;padding:8px">FS init failed: ' + e.message + '</div>';
  }
}

/* ============================================================
   Engine launch
   ============================================================ */
let engineLoaded = false;

function launchEngine() {
  if (engineLoaded) return;
  sessionStorage.setItem('boot_rsdkv4', 'true');
  location.reload();
}

window.addEventListener('DOMContentLoaded', () => {
  // Start FaviconLoader watching for title changes immediately
  FaviconLoader.init();

  if (window.IS_GAME_MODE) {
    engineLoaded = true;
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('console-panel').classList.add('visible');

    (function() {
      const wrap = (orig, prefix) => function(...args) {
        const text = args.map(a => typeof a === 'object' ? JSON.stringify(a,null,2) : String(a)).join(' ');
        window.__engineConsoleAppend?.(prefix + text);
        orig.apply(console, args);
      };
      console.log   = wrap(console.log,   '');
      console.error = wrap(console.error, '[ERROR] ');
      console.warn  = wrap(console.warn,  '[WARNING] ');
      console.info  = wrap(console.info,  '[INFO] ');
    })();

    loadScript(LIB_RSDK)
      .then(() => {
        Module.mainScriptUrlOrBlob = RSDK_JS;
        Module.locateFile = function(path, prefix) {
          if (path.endsWith('.wasm') || path.endsWith('.worker.js'))
            return DEV_MODE ? ('./' + path) : (CDN_BASE + path);
          return prefix + path;
        };
      })
      .then(() => loadScript(RSDK_JS))
      .catch(err => {
        console.error('[Launcher] Engine load failed:', err);
        setSplashStatus('Error loading engine — check console');
      });

  } else {
    for (const l of window.__engineConsoleBuffer) appendConsoleLine(l);
  }
});

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.crossOrigin = 'anonymous';
    s.onload = res;
    s.onerror = () => {
      console.error('[Launcher] Failed to load', src);
      setSplashStatus('Error loading: ' + src);
      rej(new Error('Failed: ' + src));
    };
    document.head.appendChild(s);
  });
}

function setSplashStatus(text) {
  document.getElementById('splash-status').textContent = text;
}
</script>
